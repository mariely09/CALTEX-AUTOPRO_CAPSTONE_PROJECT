<script>
// Sidebar navigation functions
function toggleSubmenu(submenuId, button) {
    const submenu = document.getElementById(submenuId);
    const arrow = button.querySelector('.submenu-arrow');
    if (submenu.style.display === 'none' || !submenu.style.display) {
        submenu.style.display = 'block';
        if (arrow) arrow.style.transform = 'rotate(180deg)';
    } else {
        submenu.style.display = 'none';
        if (arrow) arrow.style.transform = 'rotate(0deg)';
    }
}

// Set active nav item — runs immediately after sidebar is injected
(function initSidebarActive() {
    const currentPage = document.body.getAttribute('data-page');
    if (!currentPage) return;

    document.querySelectorAll('.admin-nav-btn').forEach(btn => btn.classList.remove('active'));

    const activeBtn = document.querySelector(`.admin-nav-btn[data-page="${currentPage}"]`);
    if (activeBtn) {
        activeBtn.classList.add('active');
        if (activeBtn.classList.contains('submenu-item')) {
            const submenu = activeBtn.closest('.admin-submenu');
            if (submenu) {
                submenu.style.display = 'block';
                const parentBtn = submenu.previousElementSibling;
                const arrow = parentBtn?.querySelector('.submenu-arrow');
                if (arrow) arrow.style.transform = 'rotate(180deg)';
            }
        }
    }
})();

// Logout handler — uses Firebase Auth if available
function handleLogout() {
    if (!confirm('Are you sure you want to logout?')) return;
    sessionStorage.removeItem('apUser');
    if (typeof firebase !== 'undefined' && firebase.auth) {
        firebase.auth().signOut().then(() => {
            window.location.href = 'login.html';
        }).catch(() => {
            window.location.href = 'login.html';
        });
    } else {
        window.location.href = 'login.html';
    }
}
</script>
