<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Maintenance – AutoPro Admin</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
</head>
<body class="portal-body" data-page="asset-servicing">

<div class="admin-dashboard" style="display:flex;">
    <div id="sidebarContainer"></div>

    <div class="admin-main">
        <div class="admin-header">
            <div>
                <div class="breadcrumb">Admin Portal › Vehicle Maintenance Management</div>
                <div class="admin-header-title">Vehicle Maintenance</div>
            </div>
            <div class="admin-header-actions">
                <button class="btn-icon btn-secondary"><span>📊</span> Export</button>
                <button class="btn-icon btn-primary" onclick="openAddServiceModal()"><span>➕</span> New Service</button>
            </div>
        </div>

        <div class="admin-content">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;">
                <div class="stat-card"><div class="stat-icon orange">📋</div><div class="stat-number" id="totalServices">0</div><div class="stat-label">Total Services</div></div>
                <div class="stat-card"><div class="stat-icon blue">🔄</div><div class="stat-number" id="ongoingServices">0</div><div class="stat-label">Ongoing</div></div>
                <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-number" id="completedServices">0</div><div class="stat-label">Completed</div></div>
                <div class="stat-card"><div class="stat-icon red">⏳</div><div class="stat-number" id="pendingServices">0</div><div class="stat-label">Pending</div></div>
            </div>

            <div class="data-table">
                <div class="table-header">
                    <span>Service Transactions</span>
                    <div class="table-actions">
                        <input type="text" class="search-bar" placeholder="Search services..." id="serviceSearch" oninput="renderServicesList()">
                        <button class="btn-icon btn-secondary"><span>📊</span> Export</button>
                        <button class="btn-icon btn-primary" onclick="openAddServiceModal()"><span>➕</span> New Service</button>
                    </div>
                </div>
                <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:1fr 1fr 1.5fr 1fr 1fr 1fr 160px;">
                    <div>Date Serviced</div><div>Plate Number</div><div>Description</div>
                    <div>Mechanic Name</div><div>Total Cost</div><div>Status</div><div>Actions</div>
                </div>
                <div id="servicesList"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="../static/js/data.js"></script>

<!-- Firebase SDK -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="../static/js/admin_firebase.js"></script>

<script src="../static/js/admin_functions.js"></script>
<script src="../static/js/admin.js"></script>
<script>
    fetch('admin_sidebar.html').then(r => r.text()).then(html => {
        document.getElementById('sidebarContainer').innerHTML = html;
    });
</script>
</body>
</html>
