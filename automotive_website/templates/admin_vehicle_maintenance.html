<script>
var _svcEditingId = null;
var _svcServiceItems = [];
var _svcMaterialItems = [];
var _svcVehicles = [];

// Populate vehicle dropdown and item lists from Firebase data
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    // Vehicles
    _svcVehicles = window._fbVehicles || window.assets || [];
    // Item master
    var master = window.itemMaster || [];
    _svcServiceItems = master.filter(function(i){ return i.itemType === 'Service'; });
    _svcMaterialItems = master.filter(function(i){ return i.itemType === 'Material'; });
  }, 1500);
});

function svcPlateLookup(input) {
  var q = input.value.trim().toUpperCase();
  var suggestions = document.getElementById('svcPlateSuggestions');
  var hidden = document.getElementById('svcPlateSelect');
  var info = document.getElementById('svcVehicleInfo');

  // Clear selected value when user types
  hidden.value = '';
  info.style.display = 'none';

  if (!q) { suggestions.style.display = 'none'; return; }

  var matches = _svcVehicles.filter(function(v) {
    var plate = (v.plate || v.plateNumber || '').toUpperCase();
    var desc = (v.desc || v.assetDescription || '').toUpperCase();
    return plate.includes(q) || desc.includes(q);
  });

  if (matches.length === 0) { suggestions.style.display = 'none'; return; }

  suggestions.innerHTML = matches.map(function(v) {
    var plate = v.plate || v.plateNumber || '';
    var desc = v.desc || v.assetDescription || '';
    var owner = v.owner || '';
    return '<div style="padding:0.6rem 0.85rem;cursor:pointer;border-bottom:1px solid #f0f4f8;display:flex;align-items:center;gap:0.6rem;" '
      + 'onmousedown="event.preventDefault();svcPlateSelect(\'' + plate.replace(/'/g,"\\'") + '\');">'
      + '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#003087" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'
      + '<div>'
      + '<div style="font-weight:700;font-size:0.85rem;color:#1a202c;">' + plate + '</div>'
      + (desc ? '<div style="font-size:0.75rem;color:#718096;">' + desc + (owner ? ' • ' + owner : '') + '</div>' : '')
      + '</div>'
      + '</div>';
  }).join('');
  suggestions.style.display = 'block';
}

function svcPlateSelect(plate) {
  var v = _svcVehicles.find(function(x){ return (x.plate || x.plateNumber) === plate; });
  document.getElementById('svcPlateInput').value = plate;
  document.getElementById('svcPlateSelect').value = plate;
  document.getElementById('svcPlateSuggestions').style.display = 'none';
  var info = document.getElementById('svcVehicleInfo');
  if (v) {
    info.style.display = 'flex';
    info.style.alignItems = 'center';
    info.style.gap = '0.6rem';
    info.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E31E24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'
      + '<div><div style="font-weight:600;font-size:0.85rem;color:#1a202c;">' + (v.desc || v.assetDescription || plate) + '</div>'
      + (v.owner ? '<div style="font-size:0.75rem;color:#718096;">' + v.owner + '</div>' : '')
      + '</div>';
  } else {
    info.style.display = 'none';
  }
}

// Keep backward compat for editService which calls svcOnPlateChange
function svcOnPlateChange(sel) { svcPlateSelect(sel.value || sel); }

function svcParseToInputDate(dateStr) {
  if (!dateStr) return '';
  // Try parsing common formats: "Jan 5, 2025", "1/5/2025", "2025-01-05"
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function svcCalcTotal() {
  var total = 0;
  document.querySelectorAll('#svcSvcRows .svc-row, #svcMatRows .svc-row').forEach(function(row) {
    var qty = parseFloat((row.querySelector('.svc-row-qty') || {}).value) || 0;
    var cost = parseFloat((row.querySelector('.svc-row-cost') || {}).value) || 0;
    total += qty * cost;
  });
  document.getElementById('svcTotalDisplay').textContent = '₱' + total.toLocaleString('en-PH', {minimumFractionDigits:2});
  return total;
}

function svcAddSvcRow(name, qty, uom, cost) {
  var opts = _svcServiceItems.map(function(i){ return '<option value="' + i.itemName + '">' + i.itemName + '</option>'; }).join('');
  var div = document.createElement('div');
  div.className = 'svc-row';
  div.style.cssText = 'margin-bottom:0.6rem;';
  div.innerHTML =
    '<div style="display:flex;gap:0.4rem;align-items:center;">'
    + '<select class="svc-row-name" style="flex:1;padding:0.55rem 0.75rem;border:1px solid #e2e8f0;border-radius:8px;font-size:0.83rem;background:white;" onchange="svcOnSvcSelect(this)">'
    + '<option value="">Select service...</option>' + opts
    + '</select>'

}

function svcMatLookup(input, exact) {
  var row = input.closest('.svc-row');
  var q = input.value.trim().toLowerCase();
  var suggestions = row.querySelector('.svc-mat-suggestions');
  if (!q) { suggestions.style.display = 'none'; return; }

  var matches = _svcMaterialItems.filter(function(i){
    return i.itemName.toLowerCase().includes(q);
  });

  if (exact && matches.length === 1) {
    suggestions.style.display = 'none';
    svcMatApply(row, matches[0].itemName, matches[0].uom, matches[0].cost, null);
    return;
  }
  if (exact && matches.length === 0) return;

  if (matches.length === 0) { suggestions.style.display = 'none'; return; }

  suggestions.innerHTML = matches.map(function(i){
    return '<div style="padding:0.5rem 0.75rem;cursor:pointer;font-size:0.83rem;border-bottom:1px solid #f0f4f8;" '
      + 'onmousedown="event.preventDefault();svcMatApply(this.closest(\'.svc-row\'),\'' + i.itemName.replace(/'/g,"\\'") + '\',\'' + (i.uom||'').replace(/'/g,"\\'") + '\',\'' + (i.cost||'0') + '\',null);this.closest(\'.svc-mat-suggestions\').style.display=\'none\';">'
      + '<strong>' + i.itemName + '</strong>'
      + '<span style="color:#718096;font-size:0.75rem;margin-left:0.5rem;">' + (i.uom||'') + ' • ₱' + parseFloat(i.cost||0).toLocaleString('en-PH',{minimumFractionDigits:2}) + '</span>'
      + '</div>';
  }).join('');
  suggestions.style.display = 'block';
}

function svcMatApply(row, name, uom, cost, maxStock) {
  var costNum = parseFloat(cost) || 0;
  row.querySelector('.svc-mat-search').value = name;
  row.querySelector('.svc-row-name').value = name;
  row.querySelector('.svc-row-uom').value = uom || '';
  row.querySelector('.svc-row-cost').value = costNum;
  row.querySelector('.svc-mat-name-display').textContent = name;
  row.querySelector('.svc-row-meta').textContent = 'UOM: ' + (uom||'—') + '  •  Unit Cost: ₱' + costNum.toLocaleString('en-PH',{minimumFractionDigits:2});
  row.querySelector('.svc-mat-suggestions').style.display = 'none';

  // Fetch stock
  firebase.firestore().collection('stock_inventory').where('name','==',name).limit(1).get().then(function(snap){
    var available = snap.empty ? 99999 : ((snap.docs[0].data().stock || 0));
    row.querySelector('.svc-mat-max').value = available;
    var stockEl = row.querySelector('.svc-mat-stock');
    if (available === 99999) {
      stockEl.textContent = '';
    } else if (available === 0) {
      stockEl.style.color = '#e53e3e';
      stockEl.textContent = '⚠ Out of stock';
    } else if (available <= 5) {
      stockEl.style.color = '#d69e2e';
      stockEl.textContent = 'Available stock: ' + available;
    } else {
      stockEl.style.color = '#38a169';
      stockEl.textContent = 'Available stock: ' + available;
    }
    var qtyLabel = row.querySelector('.svc-mat-qty-label');
    qtyLabel.textContent = available === 99999 ? 'Quantity *' : 'Quantity * (max ' + available + ')';
    var qtyInput = row.querySelector('.svc-row-qty');
    qtyInput.disabled = available === 0;
    if (maxStock === null && available !== 99999) {
      var cur = parseInt(qtyInput.value) || 1;
      if (cur > available) qtyInput.value = available;
    }
    svcCalcTotal();
  });

  row.querySelector('.svc-row-detail').style.display = 'block';
  if (!row.querySelector('.svc-row-qty').value) row.querySelector('.svc-row-qty').value = 1;
  svcCalcTotal();
}

function svcMatQtyCheck(input) {
  var row = input.closest('.svc-row');
  var max = parseInt(row.querySelector('.svc-mat-max').value) || 99999;
  if (max < 99999 && parseInt(input.value) > max) input.value = max;
  svcCalcTotal();
}

window._svcViewDetails = function(docId) {
  var db = firebase.firestore();
  db.collection('maintenance').doc(docId).get().then(function(doc) {
    if (!doc.exists) return;
    var s = doc.data();
    s._docId = doc.id;

    var statusLower = (s.status || '').toLowerCase();
    var sc = { 'completed':'#38a169', 'ongoing':'#d69e2e', 'pending':'#718096' };
    var color = sc[statusLower] || '#718096';

    document.getElementById('svcDetailPlate').textContent = s.plate || '—';
    document.getElementById('svcDetailDesc').textContent = s.desc || '—';

    // Info rows
    var rows = [
      ['Plate Number', s.plate || '—'],
      ['Mechanic', s.mechanic || '—'],
      ['Date Serviced', s.date || '—'],
      ['Total Cost', s.cost || '₱0.00'],
      ['Status', '<span style="display:inline-block;padding:2px 10px;border-radius:20px;background:' + color + '1a;color:' + color + ';font-weight:700;font-size:0.82rem;">' + (s.status || '—') + '</span>'],
    ];
    document.getElementById('svcDetailRows').innerHTML = rows.map(function(r, i) {
      var isLast = i === rows.length - 1;
      return '<div style="display:flex;align-items:center;padding:0.55rem 0;' + (!isLast ? 'border-bottom:1px solid #f0f4f8;' : '') + '">'
        + '<span style="width:130px;flex-shrink:0;font-size:0.78rem;color:#718096;font-weight:500;">' + r[0] + '</span>'
        + '<span style="font-size:0.85rem;font-weight:600;color:#1a202c;flex:1;">' + r[1] + '</span>'
        + '</div>';
    }).join('');

    // Services Rendered (svcRows)
    var svcSec = document.getElementById('svcDetailSvcSection');
    var svcRowsEl = document.getElementById('svcDetailSvcRows');
    var svcRows = (s.svcRows || []).filter(function(r){ return r.name; });
    if (svcRows.length > 0) {
      svcSec.style.display = 'block';
      svcRowsEl.innerHTML = svcRows.map(function(r) {
        var qty = parseFloat(r.qty) || 1;
        var cost = parseFloat(r.cost) || 0;
        var subtotal = qty * cost;
        return '<div style="background:#ebf8ff;border-radius:10px;padding:0.75rem 1rem;border:1px solid #90cdf4;display:flex;justify-content:space-between;align-items:center;">'
          + '<div style="display:flex;align-items:center;gap:0.6rem;">'
          + '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#003087" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>'
          + '<div><div style="font-weight:600;font-size:13px;color:#1a202c;">' + (r.name || '—') + '</div>'
          + '<div style="font-size:11px;color:#718096;">' + qty + ' ' + (r.uom || '') + ' &nbsp;•&nbsp; ₱' + cost.toLocaleString('en-PH',{minimumFractionDigits:2}) + '/unit</div></div>'
          + '</div>'
          + '<span style="font-weight:700;font-size:13px;color:#1a202c;">₱' + subtotal.toLocaleString('en-PH',{minimumFractionDigits:2}) + '</span>'
          + '</div>';
      }).join('');
    } else { svcSec.style.display = 'none'; }

    // Materials Used (matRows)
    var matSec = document.getElementById('svcDetailMatSection');
    var matRowsEl = document.getElementById('svcDetailMatRows');
    var matRows = (s.matRows || []).filter(function(r){ return r.name; });
    if (matRows.length > 0) {
      matSec.style.display = 'block';
      matRowsEl.innerHTML = matRows.map(function(r) {
        var qty = parseFloat(r.qty) || 1;
        var cost = parseFloat(r.cost) || 0;
        var subtotal = qty * cost;
        return '<div style="background:#F0F4FF;border-radius:10px;padding:0.75rem 1rem;border:1px solid #bee3f8;display:flex;justify-content:space-between;align-items:center;">'
          + '<div style="display:flex;align-items:center;gap:0.6rem;">'
          + '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E31E24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'
          + '<div><div style="font-weight:600;font-size:13px;color:#1a202c;">' + (r.name || '—') + '</div>'
          + '<div style="font-size:11px;color:#718096;">' + qty + ' ' + (r.uom || '') + ' &nbsp;•&nbsp; ₱' + cost.toLocaleString('en-PH',{minimumFractionDigits:2}) + '/unit</div></div>'
          + '</div>'
          + '<span style="font-weight:700;font-size:13px;color:#1a202c;">₱' + subtotal.toLocaleString('en-PH',{minimumFractionDigits:2}) + '</span>'
          + '</div>';
      }).join('');
    } else { matSec.style.display = 'none'; }

    // Action buttons — mirror mobile logic
    var approveBtn = document.getElementById('svcDetailApproveBtn');
    var completeBtn = document.getElementById('svcDetailCompleteBtn');
    var editBtn = document.getElementById('svcDetailEditBtn');
    approveBtn.style.display = statusLower === 'pending' ? 'flex' : 'none';
    completeBtn.style.display = statusLower === 'ongoing' ? 'flex' : 'none';
    editBtn.style.display = statusLower !== 'completed' ? 'flex' : 'none';

    approveBtn.onclick = function() {
      if (!confirm('Approve service for ' + s.plate + ' and set status to Ongoing?')) return;
      db.collection('maintenance').doc(docId).update({ status: 'Ongoing' }).then(function() {
        // Update vehicle status to Under Maintenance
        db.collection('vehicles').where('plate', '==', (s.plate||'').trim().toUpperCase()).limit(1).get().then(function(vSnap) {
          if (!vSnap.empty) vSnap.docs[0].ref.update({ status: 'Under Maintenance' });
        });
        closeModal('svcDetailsModal');
        showToast('Service approved — status set to Ongoing!', 'success');
      }).catch(function(err) { showToast('Error: ' + err.message, 'error'); });
    };

    completeBtn.onclick = function() {
      if (!confirm('Mark service for ' + s.plate + ' as Completed?')) return;
      db.collection('maintenance').doc(docId).update({ status: 'Completed' }).then(function() {
        var now = new Date();
        var dateStr = (now.getMonth()+1) + '/' + now.getDate() + '/' + now.getFullYear();
        var plate = (s.plate || '').trim().toUpperCase();
        var matRows = s.matRows || [];
        var svcRows = s.svcRows || [];
        var batch = db.batch();

        // Auto-create issuances + deduct stock for materials
        var matPromises = matRows.filter(function(r){ return r.name; }).map(function(r) {
          var qty = parseInt(r.qty) || 1;
          var cost = parseFloat(r.cost) || 0;
          return db.collection('item_master').where('name', '==', r.name).limit(1).get().then(function(iSnap) {
            var iData = iSnap.empty ? {} : iSnap.docs[0].data();
            db.collection('issuances').add({
              id: 'ISS-AUTO-' + Date.now(),
              date: dateStr, plate: plate, assetDesc: s.desc || '',
              itemNum: iData.num || '', itemName: r.name, itemType: 'Material',
              commodityGroup: iData.group || '', uom: r.uom || '',
              qty: '' + qty, unitCost: cost.toFixed(2), subtotal: (cost * qty).toFixed(2),
              createdBy: 'Admin', maintenanceId: s.id || docId,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
            // Deduct stock
            return db.collection('stock_inventory').where('name', '==', r.name).limit(1).get().then(function(stSnap) {
              if (!stSnap.empty) {
                var stDoc = stSnap.docs[0];
                var cur = (stDoc.data().stock || 0);
                var newStock = Math.max(0, cur - qty);
                var minLevel = stDoc.data().min || 0;
                stDoc.ref.update({ stock: newStock, status: newStock >= minLevel ? 'OK' : 'Low', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
              }
              // Log OUT transaction
              db.collection('transactions').add({
                item: r.name, desc: 'Issued for maintenance ' + (s.id || docId) + ' — ' + plate,
                type: 'OUT', qty: '-' + qty, date: dateStr, by: 'Admin',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              });
            });
          });
        });

        // Issuances for service rows
        var svcPromises = svcRows.filter(function(r){ return r.name; }).map(function(r) {
          var qty = parseInt(r.qty) || 1;
          var cost = parseFloat(r.cost) || 0;
          return db.collection('item_master').where('name', '==', r.name).limit(1).get().then(function(iSnap) {
            var iData = iSnap.empty ? {} : iSnap.docs[0].data();
            return db.collection('issuances').add({
              id: 'ISS-AUTO-' + Date.now() + '-S',
              date: dateStr, plate: plate, assetDesc: s.desc || '',
              itemNum: iData.num || '', itemName: r.name, itemType: 'Service',
              commodityGroup: iData.group || '', uom: r.uom || '',
              qty: '' + qty, unitCost: cost.toFixed(2), subtotal: (cost * qty).toFixed(2),
              createdBy: 'Admin', maintenanceId: s.id || docId,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
          });
        });

        Promise.all(matPromises.concat(svcPromises)).then(function() {
          // Update vehicle status + last service date
          var lastSvcDate = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
          db.collection('vehicles').where('plate', '==', plate).limit(1).get().then(function(vSnap) {
            if (!vSnap.empty) vSnap.docs[0].ref.update({ status: 'Completed', completedAt: firebase.firestore.FieldValue.serverTimestamp(), lastSvcDate: lastSvcDate });
          });
          closeModal('svcDetailsModal');
          showToast('Service marked as Completed!', 'success');
        });
      }).catch(function(err) { showToast('Error: ' + err.message, 'error'); });
    };

    editBtn.onclick = function() { closeModal('svcDetailsModal'); editService(docId); };

    document.getElementById('svcDetailsModal').classList.add('active');
  });
}

function svcSave() {
  var plate = document.getElementById('svcPlateSelect').value;
  var mechanic = document.getElementById('svcMechanic').value.trim();
  var date = document.getElementById('svcDate').value;
  if (!plate || !mechanic || !date) { showToast('Please fill all required fields.', 'error'); return; }

  var svcRows = [], matRows = [];
  document.querySelectorAll('#svcSvcRows .svc-row').forEach(function(row) {
    var name = (row.querySelector('.svc-row-name') || {}).value || '';
    if (!name) return;
    svcRows.push({ name: name, qty: (row.querySelector('.svc-row-qty')||{}).value||'1', uom: (row.querySelector('.svc-row-uom')||{}).value||'', cost: (row.querySelector('.svc-row-cost')||{}).value||'0' });
  });
  document.querySelectorAll('#svcMatRows .svc-row').forEach(function(row) {
    var name = (row.querySelector('.svc-row-name') || {}).value || '';
    if (!name) return;
    matRows.push({ name: name, qty: (row.querySelector('.svc-row-qty')||{}).value||'1', uom: (row.querySelector('.svc-row-uom')||{}).value||'', cost: (row.querySelector('.svc-row-cost')||{}).value||'0' });
  });

  var v = _svcVehicles.find(function(x){ return (x.plate || x.plateNumber) === plate; });
  var total = svcCalcTotal();
  var data = {
    plate: plate,
    desc: v ? (v.desc || v.assetDescription || '') : '',
    mechanic: mechanic,
    date: date,
    cost: '₱' + total.toLocaleString('en-PH', {minimumFractionDigits:2}),
    svcRows: svcRows,
    matRows: matRows,
  };

  var db = firebase.firestore();
  if (window._svcEditingId) {
    db.collection('maintenance').doc(window._svcEditingId).update(data)
      .then(function() { closeModal('svcAddModal'); showToast('Service updated successfully!', 'success'); })
      .catch(function(err) { showToast('Update failed: ' + err.message, 'error'); });
  } else {
    data.status = 'Pending';
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    db.collection('maintenance').add(data)
      .then(function() { closeModal('svcAddModal'); showToast('Service added successfully!', 'success'); })
      .catch(function(err) { showToast('Save failed: ' + err.message, 'error'); });
  }
}
</script>
</html>
