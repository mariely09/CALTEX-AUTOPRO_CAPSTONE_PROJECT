    <div id="headerContainer"></div>

    <div id="sidebarContainer"></div>

    <div class="admin-main">
        <div class="admin-header">
            <div>
                <div class="breadcrumb">Admin Portal › Vehicle Maintenance Management</div>
                <div class="admin-header-title">Vehicle List</div>
            </div>
        </div>

        <div class="admin-content">
            <div class="data-table">
                <div class="table-actions" style="display:flex;justify-content:flex-end;gap:0.5rem;padding:0.75rem 1rem;border-bottom:1px solid #e2e8f0;">

                    <button class="btn-icon btn-secondary" onclick="openAssetPlateScanModal()"><span><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span> Scan Plate</button>
                    <button class="btn-icon btn-primary" onclick="openAddAssetModal()"><span>➕</span> Add Vehicle</button>
                </div>
                <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr 120px;">
                    <div>Plate Number</div><div>Vehicle Type</div><div>Owner</div>
                    <div>Odometer (km)</div><div>Last Service Date</div><div>Next PMS Due</div><div>Status</div><div>Actions</div>
                </div>
                <div id="assetsList"></div>
            </div>
        </div>
    </div>
