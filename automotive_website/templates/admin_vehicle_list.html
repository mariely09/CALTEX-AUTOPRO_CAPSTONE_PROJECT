<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle List – AutoPro Admin</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
</head>
<body class="portal-body" data-page="assets">

<div class="admin-dashboard" style="display:flex;flex-direction:column;">
    <div id="headerContainer"></div>
    <div class="admin-dashboard-body">
    <div id="sidebarContainer"></div>

    <div class="admin-main">
        <div class="admin-header">
            <div>
                <div class="breadcrumb">Admin Portal › Vehicle Maintenance Management</div>
                <div class="admin-header-title">Vehicle List</div>
            </div>
            <div style="margin-left:auto;position:relative;display:flex;align-items:center;">
                <svg style="position:absolute;left:0.65rem;pointer-events:none;color:#a0aec0;" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-bar" placeholder="Search vehicles..." id="assetSearch" style="width:220px;padding-left:2rem;" oninput="renderAssetsList()">
            </div>
        </div>

        <div class="admin-content">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(0,48,135,0.10);color:#003087;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                    </div>
                    <div class="stat-number" id="vehStatTotal">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="stat-number" id="vehStatActive">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    </div>
                    <div class="stat-number" id="vehStatMaint">0</div>
                    <div class="stat-label">Maintenance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    </div>
                    <div class="stat-number" id="vehStatOverdue">0</div>
                    <div class="stat-label">Overdue</div>
                </div>
            </div>
            <div class="data-table">
                <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr 120px;">
                    <div>Plate Number</div><div>Vehicle Type</div><div>Owner</div>
                    <div>Odometer (km)</div><div>Last Service Date</div><div>Next PMS Due</div><div>Status</div><div>Actions</div>
                </div>
                <div id="assetsList"></div>
            </div>
        </div>
    </div>
    </div><!-- /.admin-dashboard-body -->
</div>

<!-- Floating Add Button -->
<button onclick="openAddAssetModal()" style="position:fixed;bottom:2rem;right:2rem;width:56px;height:56px;border-radius:50%;background:#E31E24;border:none;color:white;cursor:pointer;box-shadow:0 4px 16px rgba(227,30,36,0.4);display:flex;align-items:center;justify-content:center;z-index:9999;transition:transform 0.2s,box-shadow 0.2s;" onmouseover="this.style.transform='scale(1.1)';this.style.boxShadow='0 6px 24px rgba(227,30,36,0.5)'" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 16px rgba(227,30,36,0.4)'">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ── View Vehicle Modal ── -->
<div class="modal" id="assetDetailsModal">
    <div class="modal-content" style="max-width:520px;padding:0;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh;">
        <div style="background:linear-gradient(135deg,#E31E24,#C41E3A);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:0.85rem;flex-shrink:0;">
            <div style="background:rgba(255,255,255,0.2);width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            </div>
            <div style="flex:1;">
                <div id="adPlate" style="color:white;font-size:1rem;font-weight:700;"></div>
                <div id="adAssetDesc" style="color:rgba(255,255,255,0.75);font-size:0.78rem;margin-top:0.1rem;"></div>
            </div>
            <button onclick="closeModal('assetDetailsModal')" style="background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">&times;</button>
        </div>
        <div style="padding:1.25rem 1.5rem;overflow-y:auto;flex:1;background:#f8fafc;">
            <div style="background:white;border-radius:14px;padding:1rem 1.25rem;border:1px solid #e2e8f0;" id="adDetailRows"></div>
        </div>
        <div style="padding:1rem 1.5rem;background:white;border-top:1px solid #e2e8f0;flex-shrink:0;">
            <button id="adEditBtn" style="width:100%;padding:0.8rem;background:linear-gradient(135deg,#E31E24,#C41E3A);border:none;border-radius:10px;color:white;font-weight:700;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Edit Vehicle
            </button>
        </div>
    </div>
</div>

<!-- ── Add / Edit Vehicle Modal ── -->
<div class="modal" id="addAssetModal">
    <div class="modal-content" style="max-width:520px;padding:0;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh;">
        <div style="background:linear-gradient(135deg,#E31E24,#C41E3A);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:0.85rem;flex-shrink:0;">
            <div id="assetModalIconWrap" style="background:rgba(255,255,255,0.2);width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg id="assetModalIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <div style="flex:1;">
                <div id="assetModalTitle" style="color:white;font-size:1rem;font-weight:700;">Add Vehicle</div>
            </div>
            <button onclick="closeModal('addAssetModal')" style="background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">&times;</button>
        </div>
        <form id="addAssetForm" style="padding:1.25rem 1.5rem;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:0.85rem;">
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Plate Number *</label>
                <input type="text" name="plateNumber" placeholder="e.g. ABC-1234" required style="margin-top:0.3rem;text-transform:uppercase;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Description *</label>
                <input type="text" name="assetDescription" placeholder="e.g. Isuzu Truck NQR 2021" required style="margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Vehicle Type</label>
                <select name="assetType" id="assetTypeSelect" style="margin-top:0.3rem;">
                    <option value="">Select type</option>
                    <option value="Truck">Truck</option>
                    <option value="Car">Car</option>
                    <option value="Van">Van</option>
                    <option value="Motorcycle">Motorcycle</option>
                </select>
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Owner</label>
                <input type="text" name="ownerName" placeholder="e.g. Juan Dela Cruz" style="margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Current Odometer (km)</label>
                <input type="number" name="currentOdometer" placeholder="e.g. 45000" min="0" style="margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Last Service Odometer (km)</label>
                <input type="number" name="lastServiceOdometer" placeholder="e.g. 40000" min="0" style="margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Last Service Date</label>
                <input type="date" name="lastServiceDate" style="margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Service Frequency (months)</label>
                <input type="number" name="serviceFrequency" placeholder="e.g. 3" min="1" style="margin-top:0.3rem;">
            </div>
            <div style="display:flex;gap:0.75rem;padding-top:0.5rem;">
                <button type="button" class="btn-secondary" style="flex:1;" onclick="closeModal('addAssetModal')">Cancel</button>
                <button type="submit" class="btn-primary" style="flex:1;display:flex;align-items:center;justify-content:center;gap:0.4rem;" id="assetSubmitBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save
                </button>
            </div>
        </form>
    </div>
</div>

<div id="toast"></div>

<script src="../static/js/admin_sidebar.js"></script>
<script>
  // Patch renderAssetsList to also update vehicle stat cards
  (function() {
    function updateVehStats() {
      var assets = window.assets || [];
      var s = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };
      s('vehStatTotal', assets.length);
      s('vehStatActive', assets.filter(function(a){ return a.status === 'active' || a.status === 'Active'; }).length);
      s('vehStatMaint', assets.filter(function(a){ return a.status === 'maintenance' || a.status === 'Under Maintenance'; }).length);
      s('vehStatOverdue', assets.filter(function(a){
        if (!a.nextPMSDue) return false;
        return new Date(a.nextPMSDue) < new Date();
      }).length);
    }
    var _orig = window.renderAssetsList;
    window.renderAssetsList = function() {
      if (typeof _orig === 'function') _orig();
      updateVehStats();
    };
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(updateVehStats, 1500);
    });
  })();

  // ── Vehicle modal functions ──
  var _editingVehicleId = null;

  function _vehDetailRow(label, value) {
    return '<div style="display:flex;padding:0.5rem 0;border-bottom:1px solid #f7fafc;">'
      + '<span style="width:150px;flex-shrink:0;font-size:0.78rem;color:#718096;font-weight:500;">' + label + '</span>'
      + '<span style="font-size:0.85rem;font-weight:600;color:#1a202c;flex:1;">' + (value || '—') + '</span>'
      + '</div>';
  }

  function _calcNextPms(lastSvcDate, svcFreq) {
    if (!lastSvcDate || !svcFreq) return '—';
    var date = new Date(lastSvcDate);
    var months = parseInt(svcFreq);
    if (isNaN(date.getTime()) || isNaN(months)) return '—';
    date.setMonth(date.getMonth() + months);
    return date.toISOString().split('T')[0];
  }

  function viewAssetDetails(assetNum) {
    var assets = window.assets || [];
    var asset = assets.find(function(a){ return a.assetNum === assetNum || a.plateNumber === assetNum; });
    if (!asset) return;

    document.getElementById('adPlate').textContent = asset.plateNumber || asset.plate || '—';
    document.getElementById('adAssetDesc').textContent = asset.assetDescription || asset.desc || asset.type || '—';

    var nextPms = _calcNextPms(asset.lastServiceDate || asset.lastSvcDate, asset.serviceFrequency || asset.svcFreq);
    var statusColors = { 'active':'#38a169','Active':'#38a169','maintenance':'#d69e2e','Under Maintenance':'#d69e2e','completed':'#003087','Completed':'#003087','inactive':'#718096','Overdue':'#e53e3e','PMS Due Soon':'#d69e2e' };
    var sc = statusColors[asset.status] || '#718096';

    document.getElementById('adDetailRows').innerHTML =
      _vehDetailRow('Plate Number', asset.plateNumber || asset.plate)
      + _vehDetailRow('Description', asset.assetDescription || asset.desc)
      + _vehDetailRow('Owner', asset.owner)
      + _vehDetailRow('Odometer', asset.odometer ? asset.odometer.toLocaleString() + ' km' : (asset.odo || '—'))
      + _vehDetailRow('Vehicle Type', asset.type)
      + _vehDetailRow('Status', '<span style="color:' + sc + ';font-weight:700;">' + (asset.status || '—') + '</span>')
      + _vehDetailRow('Last Service Date', asset.lastServiceDate || asset.lastSvcDate || '—')
      + _vehDetailRow('Next PMS Due', nextPms);

    document.getElementById('adEditBtn').onclick = function() {
      closeModal('assetDetailsModal');
      editAsset(assetNum);
    };
    document.getElementById('assetDetailsModal').classList.add('active');
  }

  function openAddAssetModal() {
    _editingVehicleId = null;
    document.getElementById('assetModalTitle').textContent = 'Add Vehicle';
    document.getElementById('assetSubmitBtn').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save';
    document.getElementById('assetModalIcon').innerHTML = '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>';
    document.getElementById('addAssetForm').reset();
    populateVehicleTypeDropdown('assetTypeSelect', '');
    document.getElementById('addAssetModal').classList.add('active');
  }

  function editAsset(assetNum) {
    var assets = window.assets || [];
    var asset = assets.find(function(a){ return a.assetNum === assetNum || a.plateNumber === assetNum; });
    if (!asset) return;
    _editingVehicleId = asset.id;
    document.getElementById('assetModalTitle').textContent = 'Edit Vehicle';
    document.getElementById('assetSubmitBtn').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Update';
    document.getElementById('assetModalIcon').innerHTML = '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>';
    var form = document.getElementById('addAssetForm');
    form.elements.plateNumber.value = asset.plateNumber || asset.plate || '';
    form.elements.assetDescription.value = asset.assetDescription || asset.desc || '';
    form.elements.ownerName.value = asset.owner || '';
    form.elements.currentOdometer.value = asset.odometer ? String(asset.odometer).replace(/[^0-9]/g, '') : '';
    form.elements.lastServiceOdometer.value = asset.lastSvcOdo || asset.lastServiceOdometer || '';
    form.elements.lastServiceDate.value = asset.lastServiceDate || asset.lastSvcDate || '';
    form.elements.serviceFrequency.value = asset.svcFreq || asset.serviceFrequency || '';
    populateVehicleTypeDropdown('assetTypeSelect', asset.type || '');
    document.getElementById('addAssetModal').classList.add('active');
  }

  function deleteAsset(assetNum) {
    var assets = window.assets || [];
    var asset = assets.find(function(a){ return a.assetNum === assetNum || a.plateNumber === assetNum; });
    if (!asset) return;
    if (!confirm('Delete "' + (asset.plateNumber || asset.plate) + '"? This cannot be undone.')) return;
    var docId = asset.id;
    firebase.firestore().collection('vehicles').doc(docId).delete()
      .then(function() { showToast('Vehicle deleted successfully!', 'success'); })
      .catch(function(err) { showToast('Delete failed: ' + err.message, 'error'); });
  }

  document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('addAssetForm');
    if (!form) return;
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var plate = form.elements.plateNumber.value.trim().toUpperCase();
      if (!plate) return;
      var lastSvcDate = form.elements.lastServiceDate.value;
      var svcFreq = form.elements.serviceFrequency.value;
      var data = {
        plate: plate,
        desc: form.elements.assetDescription.value.trim(),
        type: form.elements.assetType.value,
        owner: form.elements.ownerName.value.trim(),
        odo: form.elements.currentOdometer.value ? form.elements.currentOdometer.value + ' km' : '',
        lastSvcOdo: form.elements.lastServiceOdometer.value,
        lastSvcDate: lastSvcDate,
        svcFreq: svcFreq,
      };
      // Also keep legacy fields for compatibility
      data.plateNumber = data.plate;
      data.assetDescription = data.desc;
      data.odometer = parseInt(form.elements.currentOdometer.value) || 0;
      data.lastServiceDate = lastSvcDate;
      data.serviceFrequency = parseInt(svcFreq) || null;
      if (lastSvcDate && svcFreq) {
        var d = new Date(lastSvcDate);
        d.setMonth(d.getMonth() + parseInt(svcFreq));
        data.nextPMSDue = d.toISOString().split('T')[0];
      }

      var db = firebase.firestore();
      if (_editingVehicleId) {
        db.collection('vehicles').doc(_editingVehicleId).update(data)
          .then(function() { closeModal('addAssetModal'); showToast('Vehicle updated successfully!', 'success'); })
          .catch(function(err) { showToast('Update failed: ' + err.message, 'error'); });
      } else {
        // Check duplicate plate
        db.collection('vehicles').where('plate', '==', plate).limit(1).get().then(function(snap) {
          if (!snap.empty) { showToast('A vehicle with this plate already exists.', 'error'); return; }
          data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          data.status = 'Active';
          return db.collection('vehicles').add(data);
        }).then(function(ref) {
          if (ref) { closeModal('addAssetModal'); showToast('Vehicle added successfully!', 'success'); }
        }).catch(function(err) { showToast('Save failed: ' + err.message, 'error'); });
      }
    });
  });
</script>
</html>
