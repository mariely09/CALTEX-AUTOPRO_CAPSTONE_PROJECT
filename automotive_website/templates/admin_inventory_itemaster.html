<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Master – AutoPro Admin</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
</head>
<body class="portal-body" data-page="item-master">

<div class="admin-dashboard" style="display:flex;flex-direction:column;">
    <div id="headerContainer"></div>
    <div class="admin-dashboard-body">
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- Main -->
    <div class="admin-main">
        <div class="admin-header">
            <div>
                <div class="breadcrumb">Admin Portal › Inventory Management</div>
                <div class="admin-header-title">Item Master</div>
            </div>
            <div style="margin-left:auto;">
                <input type="text" class="search-bar" placeholder="🔍 Search items..." id="itemMasterSearch" style="width:220px;" oninput="renderItemMasterList()">
            </div>
        </div>

        <div class="admin-content">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <!-- list_alt_outlined -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
                    </div>
                    <div class="stat-number" id="imStatTotal">0</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">
                        <!-- inventory_2_outlined -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h14a2 2 0 0 1 2 2v3H3V6a2 2 0 0 1 2-2z"/><path d="M3 9h18v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/><path d="M10 13h4"/></svg>
                    </div>
                    <div class="stat-number" id="imStatMaterials">0</div>
                    <div class="stat-label">Materials</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(0,48,135,0.10);color:#003087;">
                        <!-- build_outlined -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    </div>
                    <div class="stat-number" id="imStatServices" style="color:#003087;">0</div>
                    <div class="stat-label">Services</div>
                </div>
            </div>
            <div class="data-table">
                <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:1fr 1fr 1.5fr 1fr 1fr 1fr 1fr 120px;">
                    <div>Item Number</div><div>Item Name</div><div>Description</div><div>Commodity Group</div>
                    <div>UOM</div><div>Item Type</div><div>Cost</div><div>Actions</div>
                </div>
                <div id="itemMasterList"></div>
            </div>
            </div><!-- /.data-table wrapper -->
        </div>
    </div>
    </div><!-- /.admin-dashboard-body -->
</div>

<!-- Add / Edit Item Master Modal -->
<div class="modal" id="addItemMasterModal">
    <div class="modal-content" style="max-width:560px;padding:0;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh;">
        <!-- Header -->
        <div id="imModalHeader" style="background:linear-gradient(135deg,#E31E24,#C41E3A);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:0.85rem;flex-shrink:0;">
            <div id="imModalIconWrap" style="background:rgba(255,255,255,0.2);width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;">📋</div>
            <div style="flex:1;">
                <div id="itemMasterModalTitle" style="color:white;font-size:1rem;font-weight:700;">Add Item</div>
            </div>
            <button onclick="closeModal('addItemMasterModal')" style="background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">&times;</button>
        </div>
        <!-- Form -->
        <form id="addItemMasterForm" style="padding:1.25rem 1.5rem;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:0.85rem;">
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Item Number</label>
                <input type="text" name="itemNum" id="itemMasterItemNum" readonly style="background:#f7fafc;margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">SKU</label>
                <input type="number" name="sku" placeholder="e.g. 10001" min="0" step="1" style="margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Item Name *</label>
                <input type="text" name="itemName" placeholder="e.g., Engine Oil 5W-30" required style="margin-top:0.3rem;">
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Commodity Group</label>
                <select name="commodityGroup" id="itemMasterCommodityGroup" onchange="onItemMasterCommodityGroupChange(this)" style="margin-top:0.3rem;"><option value="">Select group</option></select>
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">UOM</label>
                <select name="uom" id="itemMasterUOM" style="margin-top:0.3rem;"><option value="">Select UOM</option></select>
            </div>
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Description</label>
                <textarea name="description" rows="2" placeholder="Detailed description..." style="margin-top:0.3rem;"></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group" style="margin:0;">
                    <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Cost (₱)</label>
                    <input type="number" name="cost" placeholder="e.g., 450.00" step="0.01" min="0" style="margin-top:0.3rem;">
                </div>
                <div class="form-group" style="margin:0;">
                    <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Type *</label>
                    <select name="itemType" id="itemMasterItemType" required style="margin-top:0.3rem;">
                        <option value="">Select Type</option>
                        <option value="Material">Material</option>
                        <option value="Service">Service</option>
                    </select>
                </div>
            </div>
            <!-- Barcode/QR — only for Material -->
            <div id="imBarcodeQRRow" style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group" style="margin:0;">
                    <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Barcode</label>
                    <div style="display:flex;gap:0.3rem;margin-top:0.3rem;">
                        <input type="text" name="barcode" id="itemMasterBarcode" placeholder="e.g., 1234567890" style="flex:1;min-width:0;">
                        <button type="button" onclick="generateItemMasterBarcode()" style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:0 0.6rem;cursor:pointer;font-size:0.75rem;white-space:nowrap;color:#4a5568;">⚙️</button>
                    </div>
                </div>
                <div class="form-group" style="margin:0;">
                    <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">QR Code</label>
                    <div style="display:flex;gap:0.3rem;margin-top:0.3rem;">
                        <input type="text" name="qrcode" id="itemMasterQRCode" placeholder="e.g., QR-ITM-001" style="flex:1;min-width:0;">
                        <button type="button" onclick="generateItemMasterQRCode()" style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:0 0.6rem;cursor:pointer;font-size:0.75rem;white-space:nowrap;color:#4a5568;">⚙️</button>
                    </div>
                </div>
            </div>
            <!-- Footer buttons -->
            <div style="display:flex;gap:0.75rem;padding-top:0.5rem;">
                <button type="button" class="btn-secondary" style="flex:1;" onclick="closeModal('addItemMasterModal')">Cancel</button>
                <button type="submit" class="btn-primary" style="flex:1;" id="imSubmitBtn">💾 Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Item Master Details Modal -->
<div class="modal" id="itemMasterDetailsModal">
    <div class="modal-content" style="max-width:520px;padding:0;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh;">
        <!-- Colored header — red for Material, blue for Service -->
        <div id="imDetailHeader" style="background:linear-gradient(135deg,#E31E24,#C41E3A);padding:1.25rem 1.5rem;position:relative;overflow:hidden;flex-shrink:0;">
            <button onclick="closeModal('itemMasterDetailsModal')" style="position:absolute;top:0.85rem;right:0.85rem;background:rgba(255,255,255,0.2);border:none;color:white;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;">&times;</button>
            <div style="display:flex;align-items:center;gap:0.85rem;position:relative;z-index:1;">
                <div id="imDetailIconWrap" style="background:rgba(255,255,255,0.2);width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">📦</div>
                <div>
                    <div id="imItemName" style="font-size:1.05rem;font-weight:800;color:white;line-height:1.3;"></div>
                    <div id="imGroupBadge" style="font-size:0.78rem;color:rgba(255,255,255,0.75);margin-top:0.2rem;"></div>
                </div>
            </div>
        </div>
        <!-- Detail rows -->
        <div style="padding:1.25rem 1.5rem;overflow-y:auto;flex:1;background:#f8fafc;display:flex;flex-direction:column;gap:0;">
            <div style="background:white;border-radius:14px;padding:1rem 1.25rem;border:1px solid #e2e8f0;">
                <div id="imDetailRows" style="display:flex;flex-direction:column;gap:0;"></div>
            </div>
            <!-- Barcode/QR section — shown only for Material -->
            <div id="imScanSection" style="display:none;margin-top:0.75rem;">
                <div style="background:white;border-radius:14px;padding:1rem 1.25rem;border:1px solid #e2e8f0;">
                    <div style="font-size:0.72rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:0.85rem;">Scan Codes</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                        <div style="text-align:center;">
                            <div style="font-size:0.72rem;color:#718096;margin-bottom:0.6rem;font-weight:600;">Barcode</div>
                            <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:0.75rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem;">
                                <svg id="imBarcodeImg" style="max-width:100%;"></svg>
                                <div id="imBarcode" style="font-family:monospace;font-size:0.72rem;color:#718096;word-break:break-all;"></div>
                            </div>
                        </div>
                        <div style="text-align:center;">
                            <div style="font-size:0.72rem;color:#718096;margin-bottom:0.6rem;font-weight:600;">QR Code</div>
                            <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:0.75rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem;">
                                <div id="imQRImg" style="display:flex;justify-content:center;"></div>
                                <div id="imQR" style="font-family:monospace;font-size:0.72rem;color:#718096;word-break:break-all;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <div style="padding:1rem 1.5rem;background:white;border-top:1px solid #e2e8f0;flex-shrink:0;">
            <button id="imDetailEditBtn" style="width:100%;padding:0.8rem;background:linear-gradient(135deg,#E31E24,#C41E3A);border:none;border-radius:10px;color:white;font-weight:700;cursor:pointer;font-size:0.95rem;">✏️ Edit</button>
        </div>
    </div>
</div>

<!-- Item Master Scan Modal -->
<div class="modal" id="itemMasterScanModal">
    <div class="modal-content" style="max-width:420px;border-radius:20px;overflow:hidden;padding:0;">
        <div style="background:linear-gradient(135deg,#E31E24,#C41E3A);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <div style="background:rgba(255,255,255,0.2);width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">📷</div>
                <div style="color:white;font-size:1rem;font-weight:700;">Scan Item</div>
            </div>
            <button onclick="closeModal('itemMasterScanModal')" style="background:rgba(255,255,255,0.2);border:none;color:white;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">&times;</button>
        </div>
        <div style="padding:1.5rem;background:#f8fafc;">
            <div style="background:white;border:2px dashed #cbd5e0;border-radius:14px;padding:2rem;text-align:center;margin-bottom:1.25rem;">
                <div style="font-size:3rem;margin-bottom:0.5rem;">📷</div>
                <div style="color:#4a5568;font-weight:600;font-size:0.88rem;">Camera Preview</div>
            </div>
            <div style="background:white;border-radius:12px;padding:1.1rem;border:1px solid #e2e8f0;">
                <label style="font-size:0.75rem;font-weight:700;color:#4a5568;text-transform:uppercase;display:block;margin-bottom:0.5rem;">Or Enter Code Manually</label>
                <input type="text" id="itemMasterScanInput" placeholder="Enter barcode or QR code..." style="width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:0.65rem 0.9rem;font-size:0.9rem;outline:none;box-sizing:border-box;">
                <button class="btn-primary" style="width:100%;margin-top:0.65rem;" onclick="searchItemMasterByScan()">🔍 Search Item</button>
            </div>
        </div>
    </div>
</div>
<!-- Floating Add Button -->
<button onclick="openAddItemMasterModal()" style="position:fixed;bottom:2rem;right:2rem;width:56px;height:56px;border-radius:50%;background:#E31E24;border:none;color:white;cursor:pointer;box-shadow:0 4px 16px rgba(227,30,36,0.4);display:flex;align-items:center;justify-content:center;z-index:9999;transition:transform 0.2s,box-shadow 0.2s;" onmouseover="this.style.transform='scale(1.1)';this.style.boxShadow='0 6px 24px rgba(227,30,36,0.5)'" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 16px rgba(227,30,36,0.4)'">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div id="toast"></div>

<script src="../static/js/admin_sidebar.js"></script>
<script>
  // Update Item Master stat cards from live data
  (function() {
    function updateImStats() {
      const items = window.itemMaster || [];
      const total = items.length;
      const materials = items.filter(i => (i.itemType || i.type || '') === 'Material').length;
      const services = items.filter(i => (i.itemType || i.type || '') === 'Service').length;
      const t = document.getElementById('imStatTotal');
      const m = document.getElementById('imStatMaterials');
      const s = document.getElementById('imStatServices');
      if (t) t.textContent = total;
      if (m) m.textContent = materials;
      if (s) s.textContent = services;
    }
    // Patch renderItemMasterList to also update stats
    const _orig = window.renderItemMasterList;
    window.renderItemMasterList = function() {
      if (typeof _orig === 'function') _orig();
      updateImStats();
    };
    // Also update on initial load
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(updateImStats, 1000);
    });
  })();
</script>
</body>
</html>
