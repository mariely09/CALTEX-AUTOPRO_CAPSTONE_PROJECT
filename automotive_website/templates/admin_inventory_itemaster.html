<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Master – AutoPro Admin</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
</head>
<body class="portal-body" data-page="item-master">

<div class="admin-dashboard" style="display:flex;">
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- Main -->
    <div class="admin-main">
        <div class="admin-header">
            <div>
                <div class="breadcrumb">Admin Portal › Inventory Management</div>
                <div class="admin-header-title">Item Master</div>
            </div>
            <div class="admin-header-actions">
                <button class="btn-icon btn-primary" onclick="openAddItemMasterModal()"><span>➕</span> Add Item</button>
            </div>
        </div>

        <div class="admin-content">
            <div class="data-table">
                <div class="table-header">
                    <span>Items</span>
                    <div class="table-actions">
                        <input type="text" class="search-bar" placeholder="Search items..." id="itemMasterSearch" oninput="renderItemMasterList()">
                        <button class="btn-icon btn-secondary" onclick="openItemMasterScanModal()"><span>📷</span> Scan</button>
                        <button class="btn-icon btn-primary" onclick="openAddItemMasterModal()"><span>➕</span> Add Item</button>
                    </div>
                </div>
                <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:1fr 1fr 1.5fr 1fr 1fr 1fr 1fr 120px;">
                    <div>Item Number</div><div>Item Name</div><div>Description</div><div>Commodity Group</div>
                    <div>UOM</div><div>Item Type</div><div>Cost</div><div>Actions</div>
                </div>
                <div id="itemMasterList"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modals injected from admin_dashboard.html JS -->
<div id="addItemMasterModal" class="modal"></div>
<div id="itemMasterDetailsModal" class="modal"></div>
<div id="itemMasterScanModal" class="modal"></div>
<div id="toast"></div>

<script src="../static/js/data.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyCaoJWbwJk0Xi694ARHpdHhiNjT0SpASRs",
      authDomain: "caltex-autopro-1e664.firebaseapp.com",
      projectId: "caltex-autopro-1e664",
      storageBucket: "caltex-autopro-1e664.firebasestorage.app",
      messagingSenderId: "930140433367",
      appId: "1:930140433367:web:cf67bfa388fa517422b992"
    });
  }
</script>
<script src="../static/js/admin_firebase.js"></script>

<script src="../static/js/admin_functions.js"></script>
<script src="../static/js/admin.js"></script>
<script>
    fetch('admin_sidebar.html').then(r => r.text()).then(html => {
        document.getElementById('sidebarContainer').innerHTML = html;
    });
</script>
</body>
</html>
