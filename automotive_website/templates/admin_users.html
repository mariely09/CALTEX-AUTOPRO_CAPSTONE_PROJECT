<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management – AutoPro Admin</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
</head>
<body class="portal-body" data-page="users">

<div class="admin-dashboard" style="display:flex;flex-direction:column;">
    <div id="headerContainer"></div>
    <div class="admin-dashboard-body">
    <div id="sidebarContainer"></div>

    <div class="admin-main">
        <div class="admin-header">
            <div>
                <div class="breadcrumb">Admin Portal</div>
                <div class="admin-header-title">User Management</div>
            </div>
        </div>

        <div class="admin-content">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:2rem;">
                <div class="stat-card">
                    <div class="stat-icon blue">👥</div>
                    <div class="stat-number" id="userStatTotal">0</div>
                    <div class="stat-label">Total Users</div>
                    <div class="stat-change positive">All registered accounts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">✅</div>
                    <div class="stat-number" id="userStatActive">0</div>
                    <div class="stat-label">Active Users</div>
                    <div class="stat-change positive">Currently enabled</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">🚫</div>
                    <div class="stat-number" id="userStatInactive">0</div>
                    <div class="stat-label">Inactive Users</div>
                    <div class="stat-change negative">Disabled accounts</div>
                </div>
            </div>

            <div class="data-table">
                <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:40px 1.5fr 1fr 1.5fr 1fr 1fr 140px;">
                    <div>#</div><div>Full Name</div><div>Username</div><div>Email</div><div>Role</div><div>Status</div><div>Actions</div>
                </div>
                <div id="userCardsList"></div>
            </div>
        </div>
    </div>
    </div><!-- /.admin-dashboard-body -->
</div>

<div id="toast"></div>

<script src="../static/js/data.js"></script>
