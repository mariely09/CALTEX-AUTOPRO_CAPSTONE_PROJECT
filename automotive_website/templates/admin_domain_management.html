<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Management – AutoPro Admin</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
</head>
<body class="portal-body" data-page="domains">

<div class="admin-dashboard" style="display:flex;flex-direction:column;">
    <div id="headerContainer"></div>
    <div class="admin-dashboard-body">
    <div id="sidebarContainer"></div>

    <div class="admin-main">
        <div class="admin-header">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <button id="dmBackBtn" onclick="dmBack()" style="display:none;background:none;border:none;cursor:pointer;padding:0.3rem;border-radius:8px;color:#4a5568;display:none;align-items:center;" title="Back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div>
                    <div class="breadcrumb">Admin Portal › Domain Management</div>
                    <div class="admin-header-title" id="dmHeaderTitle">Domain Management</div>
                </div>
            </div>
            <div id="dmHeaderActions" style="margin-left:auto;display:none;gap:0.5rem;align-items:center;">
                <div style="position:relative;display:flex;align-items:center;">
                    <svg style="position:absolute;left:0.65rem;pointer-events:none;color:#a0aec0;" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="search-bar" placeholder="Search items..." id="dmSearch" style="width:200px;padding-left:2rem;" oninput="dmRenderItems()">
                </div>
            </div>
        </div>

        <div class="admin-content">
            <!-- Domain List View -->
            <div id="dmListView">
                <div style="display:flex;flex-direction:column;gap:0.75rem;" id="dmDomainCards"></div>
            </div>

            <!-- Domain Detail View -->
            <div id="dmDetailView" style="display:none;">
                <div class="data-table">
                    <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:1fr 160px;">
                        <div>Name</div><div>Actions</div>
                    </div>
                    <div id="dmItemsList"></div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>

<!-- Floating Add Button (shown only in detail view) -->
<button id="dmFloatingAdd" onclick="dmOpenAddModal()" style="display:none;position:fixed;bottom:2rem;right:2rem;width:56px;height:56px;border-radius:50%;background:#E31E24;border:none;color:white;cursor:pointer;box-shadow:0 4px 16px rgba(227,30,36,0.4);align-items:center;justify-content:center;z-index:9999;transition:transform 0.2s,box-shadow 0.2s;" onmouseover="this.style.transform='scale(1.1)';this.style.boxShadow='0 6px 24px rgba(227,30,36,0.5)'" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 16px rgba(227,30,36,0.4)'">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
<div class="modal" id="dmItemModal">
    <div class="modal-content" style="max-width:480px;padding:0;border-radius:20px;overflow:hidden;">
        <div id="dmModalHeader" style="background:linear-gradient(135deg,#E31E24,#C41E3A);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:0.85rem;flex-shrink:0;">
            <div id="dmModalIconWrap" style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.2);">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <div style="flex:1;"><div id="dmModalTitle" style="color:white;font-size:1rem;font-weight:700;">Add Item</div></div>
            <button onclick="closeModal('dmItemModal')" style="background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">&times;</button>
        </div>
        <div style="padding:1.5rem;background:#f8fafc;">
            <div class="form-group" style="margin:0;">
                <label style="font-size:0.78rem;font-weight:600;color:#4a5568;">Name *</label>
                <input type="text" id="dmItemName" placeholder="Enter name..." style="margin-top:0.3rem;">
            </div>
        </div>
        <div style="padding:1rem 1.5rem;background:white;border-top:1px solid #e2e8f0;display:flex;gap:0.75rem;">
            <button type="button" class="btn-secondary" style="flex:1;" onclick="closeModal('dmItemModal')">Cancel</button>
            <button type="button" class="btn-primary" style="flex:1;display:flex;align-items:center;justify-content:center;gap:0.4rem;" id="dmSaveBtn" onclick="dmSaveItem()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="../static/js/data.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

      projectId: "caltex-autopro-1e664",
      storageBucket: "caltex-autopro-1e664.firebasestorage.app",
      messagingSenderId: "930140433367",
      appId: "1:930140433367:web:cf67bfa388fa517422b992"
    });
  }
</script>
<script src="../static/js/admin_firebase.js"></script>
<script src="../static/js/admin_functions.js"></script>
<script src="../static/js/admin.js"></script>
<script src="../static/js/admin_sidebar.js"></script>
<script>
var _dmDomains = [
  { key: 'commodity_groups', label: 'Commodity Groups',  color: '#E31E24', icon: 'category' },
  { key: 'uom',              label: 'Units of Measure',  color: '#E31E24', icon: 'straighten' },
  { key: 'vehicle_types',    label: 'Vehicle Types',     color: '#E31E24', icon: 'car' },
];
var _dmSeeds = {
  commodity_groups: ['Lubricants','Filters','Brakes','Tires','Electrical','Body Parts','Fluids','Labor'],
  uom:              ['pcs','L','set','job','kg','box','pair','m'],
  vehicle_types:    ['Truck','SUV','Sedan','Van','Motorcycle','Bus','Pickup'],
};

var _dmCurrentKey   = null;
var _dmCurrentLabel = null;
var _dmCurrentColor = '#003087';
var _dmItems        = [];   // cached items for current domain
var _dmEditingDocId = null;
var _dmUnsubscribe  = null;

// ── SVG icons ──────────────────────────────────────────────
function _dmIcon(key, color, size) {
  size = size || 22;
  var icons = {
    category:   '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.5 8.5 8.5 8.5"/><rect x="3" y="11" width="7" height="7" rx="1"/><circle cx="17.5" cy="14.5" r="3.5"/></svg>',
    straighten: '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 6H3a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1z"/><line x1="7" y1="6" x2="7" y2="12"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="17" y1="6" x2="17" y2="12"/></svg>',
    car:        '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 11L6.5 6.5a2 2 0 0 1 1.9-1.5h7.2a2 2 0 0 1 1.9 1.5L19 11"/><rect x="2" y="11" width="20" height="7" rx="2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/><line x1="2" y1="15" x2="22" y2="15"/></svg>',
  };
  return icons[key] || icons['category'];
}

// ── Seed defaults if empty ──────────────────────────────────
function _dmSeedAll() {
  var db = firebase.firestore();
  _dmDomains.forEach(function(d) {
    var seeds = _dmSeeds[d.key] || [];
    db.collection('domains').doc(d.key).collection('items').limit(1).get().then(function(snap) {
      if (snap.empty && seeds.length) {
        var batch = db.batch();
        seeds.forEach(function(name) {
          batch.set(db.collection('domains').doc(d.key).collection('items').doc(), {
            name: name, createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        });
        batch.commit();
      }
    });
  });
}

// ── Render domain category cards ───────────────────────────
function dmRenderCards() {
  var db = firebase.firestore();
  var container = document.getElementById('dmDomainCards');
  container.innerHTML = '';
  _dmDomains.forEach(function(d) {
    var card = document.createElement('div');
    card.style.cssText = 'background:white;border-radius:14px;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:box-shadow 0.15s;';
    card.onmouseover = function(){ this.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'; };
    card.onmouseout  = function(){ this.style.boxShadow='0 2px 8px rgba(0,0,0,0.05)'; };
    card.onclick = function(){ dmOpenDomain(d); };

    var hex = d.color;
    var iconBg = 'background:' + hex + '1a;';

    card.innerHTML =
      '<div style="width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;' + iconBg + '">'
      + _dmIcon(d.icon, hex, 22)
      + '</div>'
      + '<div style="flex:1;">'
      + '<div style="font-weight:600;font-size:0.95rem;color:#1a202c;">' + d.label + '</div>'
      + '<div id="dmCount_' + d.key + '" style="font-size:0.78rem;color:#718096;margin-top:2px;">Loading…</div>'
      + '</div>'
      + '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

    container.appendChild(card);

    // Load count
    db.collection('domains').doc(d.key).collection('items').get().then(function(snap) {
      var el = document.getElementById('dmCount_' + d.key);
      if (el) el.textContent = snap.size + ' item' + (snap.size !== 1 ? 's' : '');
    });
  });
}

// ── Open a domain detail ────────────────────────────────────
function dmOpenDomain(d) {
  _dmCurrentKey   = d.key;
  _dmCurrentLabel = d.label;
  _dmCurrentColor = d.color;

  document.getElementById('dmHeaderTitle').textContent = d.label;
  document.getElementById('dmListView').style.display   = 'none';
  document.getElementById('dmDetailView').style.display = 'block';
  document.getElementById('dmHeaderActions').style.display = 'flex';
  document.getElementById('dmSearch').value = '';

  // Show back button + floating add
  var backBtn = document.getElementById('dmBackBtn');
  backBtn.style.display = 'flex';
  var fab = document.getElementById('dmFloatingAdd');
  fab.style.display = 'flex';

  // Real-time listener
  if (_dmUnsubscribe) _dmUnsubscribe();
  _dmUnsubscribe = firebase.firestore()
    .collection('domains').doc(d.key).collection('items')
    .orderBy('name')
    .onSnapshot(function(snap) {
      _dmItems = snap.docs.map(function(doc) {
        return { id: doc.id, name: doc.data().name || '' };
      });
      dmRenderItems();
    });
}

// ── Back to list ────────────────────────────────────────────
function dmBack() {
  if (_dmUnsubscribe) { _dmUnsubscribe(); _dmUnsubscribe = null; }
  _dmCurrentKey = null;
  document.getElementById('dmHeaderTitle').textContent = 'Domain Management';
  document.getElementById('dmListView').style.display   = 'block';
  document.getElementById('dmDetailView').style.display = 'none';
  document.getElementById('dmHeaderActions').style.display = 'none';
  document.getElementById('dmBackBtn').style.display = 'none';
  document.getElementById('dmFloatingAdd').style.display = 'none';
  dmRenderCards();
}

// ── Render items list ───────────────────────────────────────
function dmRenderItems() {
  var q = (document.getElementById('dmSearch').value || '').trim().toLowerCase();
  var filtered = q ? _dmItems.filter(function(i){ return i.name.toLowerCase().includes(q); }) : _dmItems;
  var list = document.getElementById('dmItemsList');
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#718096;padding:2rem;">No items found.</div>';
    return;
  }
  var color = _dmCurrentColor;
  list.innerHTML = filtered.map(function(item) {
    return '<div class="table-row" style="grid-template-columns:1fr 160px;align-items:center;">'
      + '<div style="display:flex;align-items:center;gap:0.75rem;">'
      + '<div style="width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:' + color + '1a;flex-shrink:0;">'
      + _dmIcon(_dmDomains.find(function(d){ return d.key===_dmCurrentKey; })?.icon || 'category', color, 16)
      + '</div>'
      + '<span style="font-weight:500;font-size:0.88rem;color:#1a202c;">' + item.name + '</span>'
      + '</div>'
      + '<div style="display:flex;gap:0.3rem;">'
      + '<button class="btn-small btn-secondary" onclick="dmOpenEditModal(\'' + item.id + '\',\'' + item.name.replace(/'/g,"\\'") + '\')" title="Edit" style="display:inline-flex;align-items:center;justify-content:center;"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
      + '<button class="btn-small btn-danger" onclick="dmDeleteItem(\'' + item.id + '\',\'' + item.name.replace(/'/g,"\\'") + '\')" title="Delete" style="display:inline-flex;align-items:center;justify-content:center;"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ── Add modal ───────────────────────────────────────────────
function dmOpenAddModal() {
  _dmEditingDocId = null;
  document.getElementById('dmModalTitle').textContent = 'Add ' + _dmCurrentLabel;
  document.getElementById('dmSaveBtn').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save';
  document.getElementById('dmItemName').value = '';
  document.getElementById('dmItemModal').classList.add('active');
  setTimeout(function(){ document.getElementById('dmItemName').focus(); }, 100);
}

function dmOpenEditModal(docId, name) {
  _dmEditingDocId = docId;
  document.getElementById('dmModalTitle').textContent = 'Edit Item';
  document.getElementById('dmSaveBtn').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Update';
  document.getElementById('dmItemName').value = name;
  document.getElementById('dmItemModal').classList.add('active');
  setTimeout(function(){ document.getElementById('dmItemName').focus(); }, 100);
}

// ── Save item ───────────────────────────────────────────────
function dmSaveItem() {
  var name = document.getElementById('dmItemName').value.trim();
  if (!name) { showToast('Please enter a name.', 'error'); return; }
  var db = firebase.firestore();
  var col = db.collection('domains').doc(_dmCurrentKey).collection('items');
  if (_dmEditingDocId) {
    col.doc(_dmEditingDocId).update({ name: name })
      .then(function(){ closeModal('dmItemModal'); showToast('Item updated!', 'success'); })
      .catch(function(e){ showToast('Error: ' + e.message, 'error'); });
  } else {
    col.add({ name: name, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
      .then(function(){ closeModal('dmItemModal'); showToast('Item added!', 'success'); })
      .catch(function(e){ showToast('Error: ' + e.message, 'error'); });
  }
}

// ── Delete item ─────────────────────────────────────────────
function dmDeleteItem(docId, name) {
  if (!confirm('Delete "' + name + '"?')) return;
  firebase.firestore().collection('domains').doc(_dmCurrentKey).collection('items').doc(docId).delete()
    .then(function(){ showToast('Item deleted.', 'success'); })
    .catch(function(e){ showToast('Error: ' + e.message, 'error'); });
}

// ── Enter key saves ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('dmItemName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); dmSaveItem(); }
  });
  _dmSeedAll();
  dmRenderCards();
});
</script>
</body>
