<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPro – Login</title>
  <link rel="stylesheet" href="../static/css/login.css" />
</head>
<body>

<div class="card">
  <!-- Left Panel -->
  <div class="header">
    <div class="header-content">
      <img class="logo" src="../static/img/LOGO_CALTEX.png" alt="Caltex Logo" />
      <div class="header-text">
        <img class="wordmark-img" src="../static/img/CALTEX_LETTER.png" alt="Caltex" />
        <span class="tagline">AutoPro</span>
      </div>
      <p class="header-desc">Your trusted automotive service partner.</p>
    </div>
  </div>

  <!-- Right Panel / Form -->
  <div class="form-area">
    <p class="form-title">Login</p>
    <p class="form-sub">Sign in to your account</p>

    <label for="email">Email Address</label>
    <div class="input-wrap">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
      </span>
      <input id="email" type="email" placeholder="Enter your email" autocomplete="email" />
    </div>

    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </span>
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
      <button class="toggle-pass" type="button" id="togglePass" aria-label="Toggle password visibility" style="display:none;">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        </svg>
      </button>
    </div>

    <div class="forgot-row">
      <a href="forgot_password.html">Forgot Password?</a>
    </div>

    <button class="btn-signin" id="signinBtn" type="button">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" id="googleBtn" type="button">
      <!-- Google G logo -->
      <svg class="g-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>


<script>
  // ── Helpers ──
  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type === 'success' ? 'show success' : 'show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3500);
  }

  function setLoading(btn, loading, defaultContent) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner${btn.classList.contains('btn-google') ? ' dark' : ''}"></span>`
      : defaultContent;
  }

  // ── Toggle password ──
  const passwordInput = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePass');
  
  // Show/hide toggle button based on input
  passwordInput.addEventListener('input', () => {
    toggleBtn.style.display = passwordInput.value ? 'flex' : 'none';
  });

  toggleBtn.addEventListener('click', () => {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path stroke-linecap="round" stroke-linejoin="round"
           d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/>
         `
      : `<path stroke-linecap="round" stroke-linejoin="round"
           d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
         <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>`;
  });

  // ── Sign In ──
  const signinBtn = document.getElementById('signinBtn');
  const signinDefault = 'Sign In';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') signinBtn.click();
  });

  signinBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      showToast('Please enter email and password.');
      return;
    }

    setLoading(signinBtn, true, signinDefault);
    try {
      console.log('Attempting login with:', email);
      const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
      console.log('Login successful, UID:', cred.user.uid);
      
      // First try by UID (document ID), then fallback to email query
      let doc = await firebase.firestore().collection('users').doc(cred.user.uid).get();
      
      if (!doc.exists) {
        // Fallback: query by email field
        const snap = await firebase.firestore().collection('users')
          .where('email', '==', cred.user.email).limit(1).get();
        if (!snap.empty) {
          doc = snap.docs[0];
        }
      }

      console.log('User doc exists:', doc.exists);

      if (!doc.exists) {
        await firebase.auth().signOut();
        showToast('Account not found.');
        setLoading(signinBtn, false, signinDefault);
        return;
      }

      const data = doc.data();
      console.log('User data:', data);
      const role = data.role || '';
      const status = (data.status || 'active').toLowerCase();
      console.log('User role:', role, '| status:', status);

      // Block inactive users
      if (status === 'inactive') {
        await firebase.auth().signOut();
        showToast('Your account has been deactivated. Please contact the administrator.');
        setLoading(signinBtn, false, signinDefault);
        return;
      }
      
      // Store user in sessionStorage for dashboard auth guards
      const userData = {
        uid: cred.user.uid,
        email: cred.user.email,
        name: data.name || '',
        role: role,
      };
      
      if (role === 'admin') {
        sessionStorage.setItem('apUser', JSON.stringify(userData));
      } else if (role === 'staff') {
        sessionStorage.setItem('spUser', JSON.stringify(userData));
      } else if (role === 'customer') {
        sessionStorage.setItem('cpUser', JSON.stringify(userData));
      }
      
      redirectByRole(role);
    } catch (e) {
      console.error('Login error:', e);
      const bad = ['user-not-found', 'wrong-password', 'invalid-credential'];
      const msg = bad.includes(e.code) ? 'Invalid email or password.' : (e.message || 'Login failed.');
      showToast(msg);
      setLoading(signinBtn, false, signinDefault);
    }
  });

  // ── Google Sign-In ──
  const googleBtn = document.getElementById('googleBtn');
  const googleDefault = `<svg class="g-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
  </svg>Continue with Google`;

  googleBtn.addEventListener('click', async () => {
    setLoading(googleBtn, true, googleDefault);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred = await firebase.auth().signInWithPopup(provider);
      const uid = cred.user.uid;

      const ref = firebase.firestore().collection('users').doc(uid);
      let doc = await ref.get();

      // Fallback: query by email if doc doesn't exist
      if (!doc.exists) {
        const snap = await firebase.firestore().collection('users')
          .where('email', '==', cred.user.email).limit(1).get();
        if (!snap.empty) {
          doc = snap.docs[0];
        }
      }

      let role;
      if (!doc.exists) {
        role = 'customer';
        await ref.set({
          name: cred.user.displayName || '',
          email: cred.user.email || '',
          photoUrl: cred.user.photoURL || '',
          role,
          status: 'active',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } else {
        role = doc.data().role || 'customer';
        const status = (doc.data().status || 'active').toLowerCase();

        // Block inactive users
        if (status === 'inactive') {
          await firebase.auth().signOut();
          showToast('Your account has been deactivated. Please contact the administrator.');
          setLoading(googleBtn, false, googleDefault);
          return;
        }
      }
      
      // Store user in sessionStorage for dashboard auth guards
      const userData = {
        uid: uid,
        email: cred.user.email,
        name: cred.user.displayName || '',
        role: role,
      };
      
      if (role === 'admin') {
        sessionStorage.setItem('apUser', JSON.stringify(userData));
      } else if (role === 'staff') {
        sessionStorage.setItem('spUser', JSON.stringify(userData));
      } else {
        sessionStorage.setItem('cpUser', JSON.stringify(userData));
      }
      
      redirectByRole(role);
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        showToast('Google sign-in failed. Please try again.');
      }
    } finally {
      setLoading(googleBtn, false, googleDefault);
    }
  });

  // ── Role redirect ──
  function redirectByRole(role) {
    console.log('Redirecting role:', role); // Debug log
    const map = {
      admin:    'admin_dashboard.html',
      staff:    'staff_dashboard.html',
      customer: 'customer_dashboard.html',
    };
    const target = map[role] || 'customer_dashboard.html';
    console.log('Redirecting to:', target); // Debug log
    window.location.href = target;
  }

  // ── Forgot Password Modal ──
  // Redirects to forgot_password.html (handled via href link)
</script>

</body>
