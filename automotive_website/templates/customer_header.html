<!-- Customer Header Component -->
<header class="cu-topbar">
    <div class="cu-topbar-brand">
        <img src="../static/img/LOGO_CALTEX.png" alt="Logo" class="cu-topbar-logo">
        <div class="cu-topbar-text">
            <img src="../static/img/CALTEX_LETTER.png" alt="Caltex" class="cu-topbar-wordmark">
            <span class="cu-topbar-autopro">AutoPro</span>
        </div>
    </div>
    <div class="cu-topbar-actions">
        <!-- Notification button + dropdown panel -->
        <div class="notif-dropdown-wrap" style="position:relative;">
            <button class="cu-notif-btn" id="cuHeaderNotifBtn" onclick="toggleCuNotifPanel()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="cu-notif-badge" id="cuNotifBadge" style="display:none;">0</span>
            </button>
            <div class="notif-panel" id="cuNotifPanel" style="display:none;">
                <div class="notif-panel-header">
                    <span class="notif-panel-title">Notifications</span>
                    <span class="notif-panel-count" id="cuNotifPanelCount">0 notifications</span>
                    <button class="notif-panel-clear" onclick="clearCuNotifications()">Mark all read</button>
                </div>
                <div class="notif-panel-list" id="cuNotifList">
                    <div class="admin-notif-empty">
                        <div class="admin-notif-empty-icon">🔔</div>
                        <div class="admin-notif-empty-text">No notifications</div>
                    </div>
                </div>
                <div style="padding:0.6rem 1rem;border-top:1px solid #f0f4f8;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
                    <span style="font-size:0.72rem;color:#a0aec0;">Your notifications</span>
                    <button onclick="clearCuNotifications()" style="font-size:0.72rem;color:#E8001C;font-weight:600;background:none;border:none;cursor:pointer;padding:0.2rem 0.5rem;border-radius:6px;font-family:inherit;" onmouseover="this.style.background='#fff5f5'" onmouseout="this.style.background='none'">
                        Mark all read
                    </button>
                </div>
            </div>
        </div>
        <!-- Avatar + dropdown -->
        <div style="position:relative;">
            <div class="cu-avatar" id="cuAvatar" onclick="toggleAvatarMenu('cuAvatarMenu')" style="cursor:pointer;">CU</div>
            <div class="avatar-menu" id="cuAvatarMenu" style="display:none;">
                <div class="avatar-menu-user">
                    <div class="avatar-menu-name" id="cuAvatarName">Customer</div>
                    <div class="avatar-menu-role">Customer</div>
                </div>
                <div class="avatar-menu-divider"></div>
                <a href="profile.html" class="avatar-menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    My Profile
                </a>
                <div class="avatar-menu-divider"></div>
                <button class="avatar-menu-item avatar-menu-logout" onclick="cuAvatarLogout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Tab Bar -->
<nav class="cu-tabs" id="cuTabBar">
    <a href="customer_dashboard.html" class="cu-tab" data-page="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        My Vehicles
    </a>
    <a href="customer_pms_history.html" class="cu-tab" data-page="pms">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
        PMS History
    </a>
    <a href="customer_smart_ai.html" class="cu-tab" data-page="smart-ai">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        Smart AI
    </a>
</nav>
