<script>
// Set active tab based on current page
(function() {
    const page = document.body.getAttribute('data-page');
    if (page) {
        document.querySelectorAll('.cu-tab[data-page]').forEach(tab => {
            tab.classList.toggle('active', tab.getAttribute('data-page') === page);
        });
    }
})();
</script>
