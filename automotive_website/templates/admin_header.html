<!-- Admin Header Component -->
<header class="admin-topbar">
    <div class="admin-topbar-left">
        <button class="admin-menu-btn" id="adminMenuBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="admin-topbar-brand">
            <img src="../static/img/LOGO_CALTEX.png" alt="Logo" class="admin-topbar-logo">
            <div class="admin-topbar-text">
                <img src="../static/img/CALTEX_LETTER.png" alt="Caltex" class="admin-topbar-wordmark">
                <span class="admin-topbar-autopro">AutoPro</span>
            </div>
        </div>
    </div>
    <div class="admin-topbar-actions">
        <button class="admin-notif-btn" id="adminHeaderNotifBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="admin-notif-badge" id="adminHeaderNotifBadge" style="display:none;">0</span>
        </button>
        <div class="admin-avatar" id="adminHeaderAvatar">AD</div>
    </div>
</header>

<!-- Sidebar overlay (click to close) -->
<div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>
