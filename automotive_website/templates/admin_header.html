<!-- Admin Header Component -->
<header class="admin-topbar">
    <div class="admin-topbar-left">
        <button class="admin-menu-btn" id="adminMenuBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="admin-topbar-brand">
            <img src="../static/img/LOGO_CALTEX.png" alt="Logo" class="admin-topbar-logo">
            <div class="admin-topbar-text">
                <img src="../static/img/CALTEX_LETTER.png" alt="Caltex" class="admin-topbar-wordmark">
                <span class="admin-topbar-autopro">AutoPro</span>
            </div>
        </div>
    </div>
    <div class="admin-topbar-actions">
        <!-- Notification button + dropdown panel -->
        <div class="notif-dropdown-wrap" style="position:relative;">
            <button class="admin-notif-btn" id="adminHeaderNotifBtn" onclick="toggleAdminNotifPanel()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="admin-notif-badge" id="adminHeaderNotifBadge" style="display:none;">0</span>
            </button>
            <!-- Notification dropdown panel -->
            <div class="notif-panel" id="adminNotifPanel" style="display:none;">
                <div class="notif-panel-header">
                    <span class="notif-panel-title">Notifications</span>
                    <span class="notif-panel-count" id="adminNotifPanelCount">0 alerts</span>
                    <button class="notif-panel-clear" onclick="clearAdminNotifications()">Clear all</button>
                </div>
                <div class="notif-panel-list" id="adminNotifList">
                    <div class="admin-notif-empty">
                        <div class="admin-notif-empty-icon">🔔</div>
                        <div class="admin-notif-empty-text">No notifications</div>
                    </div>
                </div>
            </div>
        </div>
        <div style="position:relative;">
            <div class="admin-avatar" id="adminHeaderAvatar" onclick="toggleAvatarMenu('adminAvatarMenu')" style="cursor:pointer;">AD</div>
            <!-- Avatar dropdown -->
            <div class="avatar-menu" id="adminAvatarMenu" style="display:none;">
                <div class="avatar-menu-user">
                    <div class="avatar-menu-name" id="adminAvatarName">Administrator</div>
                    <div class="avatar-menu-role">Admin</div>
                </div>
                <div class="avatar-menu-divider"></div>
                <a href="profile.html" class="avatar-menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    My Profile
                </a>
                <div class="avatar-menu-divider"></div>
                <button class="avatar-menu-item avatar-menu-logout" onclick="adminAvatarLogout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Sidebar overlay (click to close) -->
<div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>
