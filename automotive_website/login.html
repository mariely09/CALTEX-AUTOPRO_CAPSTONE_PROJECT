<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPro – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    /* ── Header ── */
    .header {
      background: #E8001C;
      padding: 48px 24px 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: #fff;
      border-radius: 28px 28px 0 0;
    }
    .header img.logo {
      width: 72px; height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
    }
    .header-text { display: flex; flex-direction: column; gap: 4px; }
    .header-text .wordmark-img {
      height: 40px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    .header-text .wordmark-text {
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      line-height: 1;
    }
    .header-text .tagline {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
    }

    /* ── Form area ── */
    .form-area { padding: 4px 28px 36px; }

    .form-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }
    .form-sub {
      text-align: center;
      font-size: 13px;
      color: #718096;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .input-wrap .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #718096;
      font-size: 18px;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: #f7f8fa;
      font-size: 14px;
      color: #1a202c;
      outline: none;
      transition: border-color .2s;
    }
    .input-wrap input::placeholder { color: #a0aec0; }
    .input-wrap input:focus { border-color: #E8001C; }
    .input-wrap .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #718096;
      font-size: 18px;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 24px;
    }
    .forgot-row a {
      font-size: 12px;
      color: #718096;
      text-decoration: none;
    }
    .forgot-row a:hover { color: #E8001C; }

    .btn-signin {
      width: 100%;
      padding: 14px;
      background: #E8001C;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(232,0,28,0.3);
      transition: opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-signin:hover { opacity: .88; }
    .btn-signin:disabled { opacity: .6; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: #718096;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      color: #1a202c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .2s;
    }
    .btn-google:hover { background: #f7f8fa; }
    .btn-google:disabled { opacity: .6; cursor: not-allowed; }

    /* Google "G" SVG */
    .g-logo { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Spinner ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .spinner.dark {
      border-color: rgba(0,0,0,.15);
      border-top-color: #1a202c;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #e53e3e;
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      transition: transform .3s ease, opacity .3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { background: #38a169; }

    /* ── Forgot Password Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 36px;
      animation: slideUp .3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .modal-icon {
      width: 40px; height: 40px;
      background: rgba(232,0,28,.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .modal-icon svg { width: 20px; height: 20px; color: #E8001C; }
    .modal-titles { flex: 1; }
    .modal-titles h3 { font-size: 16px; font-weight: 700; color: #1a202c; }
    .modal-titles p { font-size: 12px; color: #718096; margin-top: 2px; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: #718096; font-size: 20px; line-height: 1;
    }

    .btn-send {
      width: 100%;
      padding: 14px;
      background: #E8001C;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .2s;
    }
    .btn-send:hover { opacity: .88; }
    .btn-send:disabled { opacity: .6; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="header">
    <img class="logo" src="img/LOGO_CALTEX.png" alt="Caltex Logo" />
    <div class="header-text">
      <img class="wordmark-img" src="img/CALTEX_LETTER.png" alt="Caltex" />
      <span class="tagline">AutoPro</span>
    </div>
  </div>

  <!-- Form -->
  <div class="form-area">
    <p class="form-title">Login</p>
    <p class="form-sub">Sign in to your account</p>

    <label for="email">Email Address</label>
    <div class="input-wrap">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
      </span>
      <input id="email" type="email" placeholder="Enter your email" autocomplete="email" />
    </div>

    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </span>
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
      <button class="toggle-pass" type="button" id="togglePass" aria-label="Toggle password visibility">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        </svg>
      </button>
    </div>

    <div class="forgot-row">
      <a href="#" id="forgotLink">Forgot Password?</a>
    </div>

    <button class="btn-signin" id="signinBtn" type="button">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" id="googleBtn" type="button">
      <!-- Google G logo -->
      <svg class="g-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Forgot Password Modal -->
<div class="overlay" id="forgotOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="#E8001C" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
        </svg>
      </div>
      <div class="modal-titles">
        <h3>Reset Password</h3>
        <p>We'll send a reset link to your email</p>
      </div>
      <button class="modal-close" id="modalClose" aria-label="Close">&#x2715;</button>
    </div>

    <label for="resetEmail">Email Address</label>
    <div class="input-wrap" style="margin-bottom:0">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
        </svg>
      </span>
      <input id="resetEmail" type="email" placeholder="Enter your email" autocomplete="email" />
    </div>

    <button class="btn-send" id="sendResetBtn" type="button">Send Reset Link</button>
  </div>
</div>

<script>
  // ── Helpers ──
  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type === 'success' ? 'show success' : 'show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3500);
  }

  function setLoading(btn, loading, defaultContent) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner${btn.classList.contains('btn-google') ? ' dark' : ''}"></span>`
      : defaultContent;
  }

  // ── Toggle password ──
  document.getElementById('togglePass').addEventListener('click', () => {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path stroke-linecap="round" stroke-linejoin="round"
           d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/>
         `
      : `<path stroke-linecap="round" stroke-linejoin="round"
           d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
         <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>`;
  });

  // ── Sign In ──
  const signinBtn = document.getElementById('signinBtn');
  const signinDefault = 'Sign In';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') signinBtn.click();
  });

  signinBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      showToast('Please enter email and password.');
      return;
    }

    setLoading(signinBtn, true, signinDefault);
    try {
      const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
      const doc = await firebase.firestore().collection('users').doc(cred.user.uid).get();

      if (!doc.exists) {
        await firebase.auth().signOut();
        showToast('Account not found.');
        return;
      }

      const role = doc.data().role || '';
      redirectByRole(role);
    } catch (e) {
      const bad = ['user-not-found', 'wrong-password', 'invalid-credential'];
      const msg = bad.includes(e.code) ? 'Invalid email or password.' : (e.message || 'Login failed.');
      showToast(msg);
    } finally {
      setLoading(signinBtn, false, signinDefault);
    }
  });

  // ── Google Sign-In ──
  const googleBtn = document.getElementById('googleBtn');
  const googleDefault = `<svg class="g-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
  </svg>Continue with Google`;

  googleBtn.addEventListener('click', async () => {
    setLoading(googleBtn, true, googleDefault);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred = await firebase.auth().signInWithPopup(provider);
      const uid = cred.user.uid;

      const ref = firebase.firestore().collection('users').doc(uid);
      const doc = await ref.get();

      let role;
      if (!doc.exists) {
        role = 'customer';
        await ref.set({
          name: cred.user.displayName || '',
          email: cred.user.email || '',
          photoUrl: cred.user.photoURL || '',
          role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } else {
        role = doc.data().role || 'customer';
      }
      redirectByRole(role);
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        showToast('Google sign-in failed. Please try again.');
      }
    } finally {
      setLoading(googleBtn, false, googleDefault);
    }
  });

  // ── Role redirect ──
  function redirectByRole(role) {
    const map = {
      admin:    'admin_dashboard.html',
      staff:    'staff_dashboard.html',
      customer: 'customer_dashboard.html',
    };
    window.location.href = map[role] || 'customer_dashboard.html';
  }

  // ── Forgot Password Modal ──
  const overlay = document.getElementById('forgotOverlay');
  document.getElementById('forgotLink').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('resetEmail').value = '';
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('resetEmail').focus(), 300);
  });
  document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

  const sendBtn = document.getElementById('sendResetBtn');
  const sendDefault = 'Send Reset Link';

  sendBtn.addEventListener('click', async () => {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return;

    setLoading(sendBtn, true, sendDefault);
    try {
      await firebase.auth().sendPasswordResetEmail(email);
      overlay.classList.remove('open');
      showToast('Reset link sent! Check your email.', 'success');
    } catch (e) {
      showToast(e.message || 'Failed to send reset email.');
    } finally {
      setLoading(sendBtn, false, sendDefault);
    }
  });
</script>
